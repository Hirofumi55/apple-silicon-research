<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1d1d1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#34aaff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0071e320"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#bf5af215"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- グリッドライン（装飾） -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- チップダイショット風ビジュアル（右側） -->
  <g transform="translate(780, 115)">
    <!-- 外枠 -->
    <rect x="0" y="0" width="300" height="300" rx="24" fill="#0071e310" stroke="#0071e340" stroke-width="1.5"/>
    <!-- 内部グリッド -->
    <rect x="50" y="50" width="200" height="200" rx="8" fill="#0071e318" stroke="#0071e360" stroke-width="1"/>
    <line x1="50" y1="117" x2="250" y2="117" stroke="#0071e330" stroke-width="0.8"/>
    <line x1="50" y1="183" x2="250" y2="183" stroke="#0071e330" stroke-width="0.8"/>
    <line x1="117" y1="50" x2="117" y2="250" stroke="#0071e330" stroke-width="0.8"/>
    <line x1="183" y1="50" x2="183" y2="250" stroke="#0071e330" stroke-width="0.8"/>
    <!-- センタードット -->
    <circle cx="150" cy="150" r="24" fill="#0071e340" stroke="#0071e3" stroke-width="1.5"/>
    <circle cx="150" cy="150" r="10" fill="#0071e3" opacity="0.8"/>
    <circle cx="150" cy="150" r="4" fill="white" opacity="0.9"/>
    <!-- 接続ピン -->
    <circle cx="0" cy="100" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="0" cy="150" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="0" cy="200" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="300" cy="100" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="300" cy="150" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="300" cy="200" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="100" cy="0" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="150" cy="0" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="200" cy="0" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="100" cy="300" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="150" cy="300" r="3" fill="#0071e3" opacity="0.5"/>
    <circle cx="200" cy="300" r="3" fill="#0071e3" opacity="0.5"/>
    <!-- 接続ライン -->
    <line x1="0" y1="100" x2="50" y2="100" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="0" y1="150" x2="50" y2="150" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="0" y1="200" x2="50" y2="200" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="250" y1="100" x2="300" y2="100" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="250" y1="150" x2="300" y2="150" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="250" y1="200" x2="300" y2="200" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="100" y1="0" x2="100" y2="50" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="150" y1="0" x2="150" y2="50" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="200" y1="0" x2="200" y2="50" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="100" y1="250" x2="100" y2="300" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="150" y1="250" x2="150" y2="300" stroke="#0071e340" stroke-width="0.8"/>
    <line x1="200" y1="250" x2="200" y2="300" stroke="#0071e340" stroke-width="0.8"/>
  </g>

  <!-- ロゴ -->
  <circle cx="100" cy="80" r="22" fill="none" stroke="#0071e3" stroke-width="2"/>
  <circle cx="100" cy="80" r="10" fill="#0071e3" opacity="0.8"/>
  <circle cx="100" cy="80" r="4" fill="white" opacity="0.9"/>
  <text x="132" y="88" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="22" font-weight="600" fill="#f5f5f7" letter-spacing="-0.5">Silicon Lab</text>

  <!-- メインタイトル -->
  <text x="100" y="240" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="72" font-weight="800" fill="#f5f5f7" letter-spacing="-3">Apple Silicon</text>
  <text x="100" y="330" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="72" font-weight="800" fill="url(#accent)" letter-spacing="-3">完全比較ガイド</text>

  <!-- サブタイトル -->
  <text x="100" y="400" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="26" fill="#a1a1a6" letter-spacing="-0.5">M1〜M5 / A15〜A19 Pro スペック・ベンチマーク</text>

  <!-- チップバッジ -->
  <g transform="translate(100, 450)">
    <rect width="80" height="32" rx="16" fill="#0071e320" stroke="#0071e350" stroke-width="1"/>
    <text x="40" y="21" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#0071e3" text-anchor="middle">M Series</text>
  </g>
  <g transform="translate(196, 450)">
    <rect width="80" height="32" rx="16" fill="#bf5af220" stroke="#bf5af250" stroke-width="1"/>
    <text x="40" y="21" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#bf5af2" text-anchor="middle">A Series</text>
  </g>
  <g transform="translate(292, 450)">
    <rect width="110" height="32" rx="16" fill="#30d15820" stroke="#30d15850" stroke-width="1"/>
    <text x="55" y="21" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#30d158" text-anchor="middle">Benchmark</text>
  </g>
  <g transform="translate(418, 450)">
    <rect width="90" height="32" rx="16" fill="#ff9f0a20" stroke="#ff9f0a50" stroke-width="1"/>
    <text x="45" y="21" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#ff9f0a" text-anchor="middle">Timeline</text>
  </g>

  <!-- 下部ライン -->
  <line x1="100" y1="510" x2="1100" y2="510" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="100" y="545" font-family="-apple-system, sans-serif" font-size="16" fill="#6e6e73">apple-silicon-research.pages.dev</text>
</svg>
